server {
    listen 7860 default_server;
    listen [::]:7860 default_server;

    server_name _;

    root /var/www/html;
    index index.html;

    # Trang Landing Page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Portal Nhà Sản Xuất
    location /nsx {
        alias /app/web_NhaSanXuat/build;
        try_files $uri $uri/ /nsx/index.html;
    }

    # Portal Nhà Phân Phối
    location /npp {
        alias /app/web_NhaPhanPhoi/build;
        try_files $uri $uri/ /npp/index.html;
    }

    # Portal Hiệu Thuốc
    location /ht {
        alias /app/web_HieuThuoc/build;
        try_files $uri $uri/ /ht/index.html;
    }

    # Portal Admin
    location /admin {
        alias /app/web_Admin/build;
        try_files $uri $uri/ /admin/index.html;
    }

    # Proxy API requests to Spring Boot Backend
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Tăng timeout để Spring Boot có đủ thời gian phản hồi
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Cấu hình CORS nội bộ
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type,Origin,Authorization' always;

        # Handle OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type,Origin,Authorization';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
