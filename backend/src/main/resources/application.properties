# Application Configuration
spring.application.name=PharmaChain API
server.port=8080
logging.level.root=INFO
logging.level.com.nckh.dia5=DEBUG

# Database Configuration - MySQL (Production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/BlockChain_DA?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=utf8&useUnicode=true&zeroDateTimeBehavior=convertToNull&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# Connection Pool Configuration - Tối ưu cho free tier (RAM thấp)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=60000

# JWT Configuration
app.jwt.secret=dia5MedicalApiSecretKeyForJwtTokenGenerationMustBeLongEnoughForHS256Algorithm
app.jwt.expiration=86400000

# Logging Configuration
logging.level.com.nckh.dia5=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson Configuration
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.deserialization.read-date-timestamps-as-nanoseconds=false

# Validation Configuration
spring.validation.bind-exceptions=true

# Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
blockchain.network.url=https://ethereum-sepolia-rpc.publicnode.com
blockchain.network.chain-id=11155111
blockchain.wallet.private-key=0x7656aaaff4e2fb95b6550974b8c9999f546d591d44930e1f60f09a797af4ae06
blockchain.gas.price=2000000000
blockchain.gas.limit=2000000

# Smart Contract Configuration
pharmaledger.contract.address=0xDDd3052fF0b0a39882260A07608d9053AdeDDB98
pharmaledger.deploy.on-startup=false
pharmaledger.blockchain.safety-buffer=2

# DrugItemTracker Contract Configuration (cho tracking từng sản phẩm riêng lẻ)
drugitemtracker.contract.address=0x8A791620dd6260079BF849Dc5567aDC3F2FdC318

# Actuator Configuration
management.endpoints.web.exposure.include=health,info

# CORS Configuration
app.cors.allowed-origins=http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://localhost:5173,*
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Flyway Configuration - DISABLED
spring.flyway.enabled=false

# File Upload Configuration
app.upload.dir=uploads/
app.upload.max-size=10MB
# ⚠️ Đặt IP thực của máy chủ backend để ảnh upload hiển thị được trên các thiết bị khác
# Thay 192.168.0.103 bằng địa chỉ IP WiFi thực của máy bạn (ipconfig)
# app.base-url=http://10.10.33.223:8080
app.base-url=${APP_BASE_URL:http://192.168.110.70:8080}

